<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photography — Yasi Khan</title>
<meta name="description" content="Photography by Yasmeena Khan — shot on Fujifilm X-T50.">
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=IBM+Plex+Mono:wght@300;400&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&family=Caveat:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  .content-body.gallery-page {
    max-width: 1100px;
  }
  .gallery {
    columns: 4;
    column-gap: 2rem;
    margin-top: 2rem;
  }
  .polaroid {
    display: inline-block;
    width: 100%;
    background: #fff;
    padding: 0.8rem 0.8rem 2.5rem;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1), 0 1px 3px rgba(0,0,0,0.06);
    break-inside: avoid;
    -webkit-column-break-inside: avoid;
    page-break-inside: avoid;
    margin-bottom: 2rem;
    overflow: hidden;
  }
  .polaroid img {
    width: 100%;
    display: block;
  }
  .polaroid-caption {
    text-align: center;
    margin-top: 0.6rem;
  }
  .polaroid-title {
    font-family: var(--hand);
    font-size: 0.9rem;
    color: var(--ink2);
  }
  .polaroid-meta {
    font-family: var(--mono);
    font-size: 0.55rem;
    color: var(--ink4);
    margin-top: 0.15rem;
  }
  .gallery-empty {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--ink4);
    margin-top: 2rem;
  }

  @media (max-width: 1000px) {
    .gallery { columns: 3; }
  }
  @media (max-width: 768px) {
    .gallery { columns: 2; column-gap: 1.5rem; }
    .polaroid { margin-bottom: 1.5rem; }
  }
  @media (max-width: 480px) {
    .gallery {
      columns: 1;
      max-width: 300px;
      margin-left: auto;
      margin-right: auto;
    }
  }
</style>
</head>
<body>
<nav class="content-nav">
  <a class="back-btn" href="index.html">&larr; bookshelf</a>
  <span class="content-title">Photography</span>
</nav>
<div class="content-body gallery-page">
  <h1>Photography</h1>
  <p>Things I thought were worth looking at again.</p>
  <div class="gallery" id="gallery"></div>
  <p class="gallery-empty" id="galleryEmpty" style="display:none;">No photos yet — drop images into the <code>photos/</code> folder.</p>
</div>

<script>
(function() {
  const gallery = document.getElementById('gallery');
  const emptyMsg = document.getElementById('galleryEmpty');
  const photoDir = 'photos/';

  fetch(photoDir + 'manifest.json')
    .then(r => r.json())
    .then(files => {
      if (files.length === 0) {
        emptyMsg.style.display = 'block';
        return;
      }

      files.forEach(file => {
        const raw = file.replace(/\.[^.]+$/, '');
        const isDefault = /^(IMG|DSCF|DSC|P)\s*\d+$/i.test(raw.replace(/[-_]/g, ' '));
        var caption = '';
        if (!isDefault) {
          // Parse "title, location - year" or "title, location, year"
          var yearMatch = raw.match(/[\s,\-]+(\d{4})$/);
          var year = yearMatch ? yearMatch[1] : '';
          var rest = yearMatch ? raw.substring(0, raw.length - yearMatch[0].length).trim() : raw;
          var comma = rest.indexOf(',');
          var title = comma > -1 ? rest.substring(0, comma).trim() : rest.trim();
          var location = comma > -1 ? rest.substring(comma + 1).trim() : '';
          var meta = [location, year].filter(Boolean).join(', ');
          caption = '<div class="polaroid-caption">' +
            '<div class="polaroid-title">' + title + '</div>' +
            (meta ? '<div class="polaroid-meta">' + meta + '</div>' : '') +
            '</div>';
        }
        var polaroid = document.createElement('div');
        polaroid.className = 'polaroid';
        var img = new Image();
        img.loading = 'lazy';
        img.alt = isDefault ? '' : raw;
        img.src = photoDir + encodeURIComponent(file);
        polaroid.appendChild(img);
        if (caption) polaroid.insertAdjacentHTML('beforeend', caption);
        gallery.appendChild(polaroid);
      });
    })
    .catch(() => {
      emptyMsg.style.display = 'block';
    });
})();
</script>
</body>
</html>
